<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Desk Diorama AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #080c18;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #e0e8f8;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ══════════════════════════════
       카메라 비디오 (전체 배경)
    ══════════════════════════════ */
    #cam-video {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
      display: none;
      transform: scaleX(-1); /* 전면 카메라 미러 보정 */
    }
    #cam-video.rear { transform: scaleX(1); } /* 후면 카메라 */

    /* ══════════════════════════════
       3D 건물 캔버스 오버레이
    ══════════════════════════════ */
    #ar-canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
      display: none;
    }

    /* ══════════════════════════════
       스플래시 화면
    ══════════════════════════════ */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 40%, #0d2040 0%, #080c18 70%);
      transition: opacity 0.5s;
    }
    #splash.gone { opacity: 0; pointer-events: none; }

    .s-icon { font-size: 64px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    .s-title {
      font-size: 26px; font-weight: 700;
      color: #00d4ff;
      text-shadow: 0 0 30px rgba(0,212,255,0.7);
      margin-bottom: 8px;
    }
    .s-sub {
      font-size: 13px; color: #5a7090;
      text-align: center; line-height: 1.6;
      margin-bottom: 44px;
      padding: 0 32px;
    }

    #btn-start {
      padding: 18px 52px;
      font-size: 16px; font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      background: linear-gradient(135deg, #00d4ff 0%, #0055ff 100%);
      border: none; border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(0,120,255,0.5), 0 6px 24px rgba(0,0,0,0.5);
      transition: transform .15s, box-shadow .15s;
    }
    #btn-start:active { transform: scale(0.94); }

    .s-note { margin-top: 20px; font-size: 11px; color: #2a4060; }

    /* ══════════════════════════════
       AR 오버레이 UI
    ══════════════════════════════ */
    #ar-ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: none;
    }
    #ar-ui.on { display: block; }

    /* 상단 상태바 */
    #status {
      position: absolute;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      padding: 10px 22px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 30px;
      font-size: 13px; font-weight: 600;
      color: #00d4ff;
      white-space: nowrap;
      pointer-events: none;
    }

    /* 중앙 타겟 조준점 */
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60px; height: 60px;
      pointer-events: none;
      opacity: 0.85;
      display: none;
    }
    #crosshair.show { display: block; }
    #crosshair svg { width: 100%; height: 100%; }

    /* 탭 유도 애니메이션 */
    @keyframes tap-pulse {
      0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.9; }
      50%  { transform: translate(-50%,-50%) scale(1.15); opacity: 0.5; }
      100% { transform: translate(-50%,-50%) scale(1); opacity: 0.9; }
    }
    #crosshair.pulse { animation: tap-pulse 1.2s ease-in-out infinite; }

    /* 하단 패널 */
    #bottom {
      position: absolute;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      width: 88%; max-width: 380px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 22px;
      padding: 16px 18px;
      pointer-events: auto;
    }

    .prog-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px; color: #5a7090;
      margin-bottom: 8px;
    }
    .prog-track {
      width: 100%; height: 5px;
      background: #111d2e;
      border-radius: 3px; overflow: hidden;
      margin-bottom: 14px;
    }
    .prog-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #00d4ff, #0055ff);
      border-radius: 3px;
      transition: width .1s linear;
    }

    #btn-exit {
      display: block; width: 100%;
      padding: 11px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #4a6080; font-size: 12px;
      cursor: pointer;
    }
    #btn-exit:active { background: rgba(255,255,255,0.14); }

    /* 건물 CSS 3D 컨테이너 */
    #city-stage {
      position: fixed;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px; height: 340px;
      z-index: 5;
      pointer-events: auto;
      cursor: pointer;
      display: none;
      perspective: 800px;
    }
    #city-stage.show { display: block; }

    #city-grid {
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transform: rotateX(55deg) rotateZ(-15deg);
      position: relative;
      transition: transform 0.4s ease;
    }

    .building-wrap {
      position: absolute;
      transform-style: preserve-3d;
    }

    .building {
      position: absolute;
      transform-origin: bottom center;
      transform-style: preserve-3d;
      transition: transform 0.05s linear;
    }

    .b-face {
      position: absolute;
      backface-visibility: hidden;
    }

    /* 그림자 */
    .city-shadow {
      position: absolute;
      bottom: -2px; left: 50%;
      transform: translateX(-50%);
      width: 290px; height: 290px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.35) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- 카메라 영상 배경 -->
  <video id="cam-video" autoplay playsinline muted></video>

  <!-- 3D 건물 씬 -->
  <div id="city-stage">
    <div class="city-shadow"></div>
    <div id="city-grid"></div>
  </div>

  <!-- AR UI 오버레이 -->
  <div id="ar-ui">
    <div id="status">📷 카메라 준비 중...</div>

    <!-- 조준점 -->
    <div id="crosshair">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="28" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4 4"/>
        <circle cx="30" cy="30" r="4"  fill="#00d4ff"/>
        <line x1="30" y1="2"  x2="30" y2="16" stroke="#00d4ff" stroke-width="1.5"/>
        <line x1="30" y1="44" x2="30" y2="58" stroke="#00d4ff" stroke-width="1.5"/>
        <line x1="2"  y1="30" x2="16" y2="30" stroke="#00d4ff" stroke-width="1.5"/>
        <line x1="44" y1="30" x2="58" y2="30" stroke="#00d4ff" stroke-width="1.5"/>
      </svg>
    </div>

    <div id="bottom">
      <div class="prog-header">
        <span id="prog-label">건물 생성</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="prog-fill"></div>
      </div>
      <button id="btn-exit" onclick="stopAR()">✕  AR 종료</button>
    </div>
  </div>

  <!-- 스플래시 -->
  <div id="splash">
    <div class="s-icon">🏙️</div>
    <div class="s-title">Desk Diorama AR</div>
    <div class="s-sub">후면 카메라로 책상 위를 비추세요<br>미니어처 도시가 그 위에 생성됩니다</div>
    <button id="btn-start" onclick="startAR()">📷 AR 시작</button>
    <div class="s-note">카메라 권한을 허용해 주세요</div>
  </div>

  <script>
  /* ════════════════════════════════════════════
     건물 데이터
  ════════════════════════════════════════════ */
  const GRID = 4, CELL = 74, OFFSET = (GRID - 1) * CELL * 0.5;

  const TYPES = [
    { h: 38, ww: 34, body: '#e8e4d6', glass: '#1e9be0', roof: '#d4cfc0' },
    { h: 62, ww: 30, body: '#d6d0c0', glass: '#0880d0', roof: '#c8c0b0' },
    { h: 95, ww: 26, body: '#c4bca8', glass: '#0660c0', roof: '#b8b0a0' },
    { h: 46, ww: 32, body: '#dcd8c8', glass: '#28b0f0', roof: '#d0cac0' },
  ];
  const LAYOUT = [0,1,2,1, 2,0,3,2, 1,3,0,1, 0,2,1,0];

  const grid = document.getElementById('city-grid');
  const buildings = [];

  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const t = TYPES[LAYOUT[r * GRID + c]];
      const px = c * CELL - OFFSET;
      const pz = r * CELL - OFFSET;

      const wrap = document.createElement('div');
      wrap.className = 'building-wrap';
      wrap.style.cssText = `
        left: calc(50% + ${px}px);
        top:  calc(50% + ${pz}px);
        width: ${t.ww}px;
        transform: translate(-50%, -50%) translateZ(0px);
      `;

      const b = document.createElement('div');
      b.className = 'building';
      b.style.cssText = `
        width: ${t.ww}px;
        height: ${t.h}px;
        bottom: 0; left: 0;
        transform: scaleY(0.001);
      `;

      // 앞면
      const front = document.createElement('div');
      front.className = 'b-face';
      front.style.cssText = `
        width:${t.ww}px; height:${t.h}px;
        background: linear-gradient(180deg, ${t.glass} 0%, ${t.glass} 35%, ${t.body} 35%, ${t.body} 100%);
        left:0; top:0;
      `;

      // 측면 (그림자 효과)
      const side = document.createElement('div');
      side.className = 'b-face';
      side.style.cssText = `
        width: 12px; height: ${t.h}px;
        background: linear-gradient(180deg, ${shadeColor(t.glass,-25)} 0%, ${shadeColor(t.glass,-25)} 35%, ${shadeColor(t.body,-20)} 35%, ${shadeColor(t.body,-20)} 100%);
        left: ${t.ww}px; top: 0;
        transform: rotateY(90deg);
        transform-origin: left center;
      `;

      // 지붕
      const roof = document.createElement('div');
      roof.className = 'b-face';
      roof.style.cssText = `
        width: ${t.ww}px; height: 12px;
        background: ${t.roof};
        left: 0; top: -12px;
      `;

      // 안테나
      const ant = document.createElement('div');
      ant.className = 'b-face';
      ant.style.cssText = `
        width: 2px; height: 14px;
        background: #aaaaaa;
        left: ${t.ww/2 - 1}px; top: -26px;
      `;

      b.append(front, side, roof, ant);
      wrap.appendChild(b);
      grid.appendChild(wrap);
      buildings.push(b);
    }
  }

  function shadeColor(hex, pct) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.max(0, Math.min(255, (n>>16) + pct));
    const g = Math.max(0, Math.min(255, ((n>>8)&0xff) + pct));
    const b2 = Math.max(0, Math.min(255, (n&0xff) + pct));
    return '#' + [r,g,b2].map(x=>x.toString(16).padStart(2,'0')).join('');
  }

  /* ════════════════════════════════════════════
     AR 상태
  ════════════════════════════════════════════ */
  let printing = false;
  let progress = 0;
  let animId   = null;
  let stream   = null;

  /* ════════════════════════════════════════════
     카메라 시작
  ════════════════════════════════════════════ */
  async function startAR() {
    const btn = document.getElementById('btn-start');
    btn.textContent = '카메라 연결 중...';
    btn.disabled = true;

    try {
      // 후면 카메라 우선 요청
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width:  { ideal: 1920 },
          height: { ideal: 1080 }
        },
        audio: false
      });

      const video = document.getElementById('cam-video');
      video.srcObject = stream;

      // 후면 카메라면 미러 해제
      const track = stream.getVideoTracks()[0];
      const settings = track.getSettings();
      if (settings.facingMode === 'environment') {
        video.classList.add('rear');
      }

      await video.play();

      // UI 전환
      video.style.display = 'block';
      document.getElementById('city-stage').classList.add('show');
      document.getElementById('ar-ui').classList.add('on');
      document.getElementById('splash').classList.add('gone');
      document.getElementById('crosshair').classList.add('show', 'pulse');

      setStatus('📡 책상 위를 향하고 화면을 탭하세요');

      // 탭/클릭으로 건물 생성
      document.getElementById('city-stage').addEventListener('click', startPrinting, { once: true });
      document.getElementById('ar-ui').addEventListener('click', startPrinting, { once: true });

    } catch (err) {
      btn.textContent = '📷 AR 시작';
      btn.disabled = false;

      if (err.name === 'NotAllowedError') {
        alert('카메라 권한이 거부되었습니다.\n브라우저 설정에서 카메라를 허용해주세요.');
      } else if (err.name === 'NotFoundError') {
        alert('카메라를 찾을 수 없습니다.');
      } else {
        alert('카메라 오류: ' + err.message);
      }
    }
  }

  /* ════════════════════════════════════════════
     건물 생성 시작
  ════════════════════════════════════════════ */
  function startPrinting() {
    if (printing) return;
    printing = true;

    document.getElementById('crosshair').classList.remove('pulse');
    document.getElementById('crosshair').classList.remove('show');
    setStatus('🏗️ 도시를 3D 프린팅 중...');

    function tick() {
      progress = Math.min(1, progress + 0.007);
      setProgress(progress);
      setBuildings(progress);

      if (progress < 1) {
        animId = requestAnimationFrame(tick);
      } else {
        setStatus('🏙️ 도시 완성! 화면을 기울여 감상하세요');
        // 기울기 감지로 시점 변화
        startDeviceMotion();
      }
    }
    animId = requestAnimationFrame(tick);
  }

  /* ════════════════════════════════════════════
     건물 높이 업데이트
  ════════════════════════════════════════════ */
  function setBuildings(p) {
    const s = Math.max(0.001, p);
    buildings.forEach(b => {
      b.style.transform = `scaleY(${s})`;
    });
  }

  /* ════════════════════════════════════════════
     진행률 UI
  ════════════════════════════════════════════ */
  function setProgress(v) {
    const pct = Math.round(v * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-pct').textContent = pct + '%';
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  /* ════════════════════════════════════════════
     기기 기울기로 도시 시점 변환
  ════════════════════════════════════════════ */
  function startDeviceMotion() {
    if (!window.DeviceOrientationEvent) return;

    window.addEventListener('deviceorientation', (e) => {
      if (!e.beta && !e.gamma) return;
      const rx = Math.max(-20, Math.min(20, (e.beta  - 45) * 0.5));
      const rz = Math.max(-20, Math.min(20, e.gamma * 0.3));
      document.getElementById('city-grid').style.transform =
        `rotateX(${55 + rx}deg) rotateZ(${-15 + rz}deg)`;
    }, { passive: true });

    // iOS 13+: 권한 요청 필요
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().catch(() => {});
    }
  }

  /* ════════════════════════════════════════════
     AR 종료
  ════════════════════════════════════════════ */
  function stopAR() {
    if (animId) cancelAnimationFrame(animId);
    if (stream) stream.getTracks().forEach(t => t.stop());

    printing = false;
    progress = 0;
    stream   = null;
    animId   = null;

    setBuildings(0);
    setProgress(0);

    document.getElementById('cam-video').style.display = 'none';
    document.getElementById('cam-video').srcObject = null;
    document.getElementById('city-stage').classList.remove('show');
    document.getElementById('ar-ui').classList.remove('on');
    document.getElementById('splash').classList.remove('gone');
    document.getElementById('btn-start').textContent = '📷 AR 시작';
    document.getElementById('btn-start').disabled = false;
  }
  </script>
</body>
</html>
